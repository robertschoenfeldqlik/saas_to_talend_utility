# docker-compose.yml — single-service deployment of the full stack
#
# Usage:
#   docker compose up -d       # build + start
#   docker compose logs -f     # follow logs
#   docker compose down        # stop + remove container
#
# The data volume persists SQLite (projects + jobs) and ai-settings.json
# across container restarts. Delete the volume to reset state:
#   docker compose down -v
#
# Optional: connect to a host-side Ollama by pointing OLLAMA_HOST at it.

services:
  saas-to-talend:
    build:
      context: .
      dockerfile: Dockerfile
    image: saas-to-talend:latest
    container_name: saas-to-talend
    ports:
      - "3000:3000"    # Web UI (React + Express)
      # - "8081:8081"  # Uncomment to expose the Java engine directly
    volumes:
      - saas-talend-data:/opt/app/server/data
    environment:
      NODE_ENV: production
      ENGINE_URL: http://localhost:8081
      PORT: 3000
      # Require HTTP Basic auth on the UI + API (recommended whenever the
      # published port is reachable beyond localhost). User defaults to "admin";
      # override with APP_AUTH_USER.
      # APP_AUTH_PASSWORD: change-me
      # Ollama on host machine (Docker Desktop):
      # OLLAMA_BASE_URL: http://host.docker.internal:11434
    restart: unless-stopped
    # Give the entrypoint's graceful shutdown (GRACE_SECONDS, default 20s) and
    # Express's own ~15s drain room to finish before Docker sends SIGKILL
    # (which defaults to 10s after SIGTERM).
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - "curl -f http://localhost:3000/api/health && curl -f http://localhost:8081/api/engine/health"
      interval: 30s
      timeout: 5s
      start_period: 25s
      retries: 3

volumes:
  saas-talend-data:
